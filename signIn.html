<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | HBO Max</title>
    <link rel="shortcut icon" href="assets/img/favicon_hbo.png" type="image/x-icon">
    <link rel="stylesheet" href="assets/css/signIn.css">
</head>

<body>

    <nav class="menu">
        <div class="menu__logo">
            <a href="#initial">
                <img src="assets/img/hbo-logo.svg" alt="Logotipo HBO MAX">
            </a>
        </div>
        <div class="menu__sign">
            <a href="#sign" class="logIn">entrar</a>
            <a href="#subscription__plans" class="menu__button">assine agora</a>
        </div>
    </nav>

    <div class="content">

        <main class="main">
            <form action="" class="login container">
                <h1 class="login__title">Entrar</h1>
                <label for="" class="login__label">Você tem uma conta da HBO Max?</label>
                <input type="email" name="email" id="login__email" placeholder="Endereço de e-mail">
                <input type="password" name="password" id="login__password" placeholder="Senha">
                <div class="login__actions">
                    <button class="login__btn button" aria-required="true">Entrar</button>
                    <a href="..." class="login__forgetPassword" required>Esqueceu a senha?</a>
                </div>
            </form>
        </main>
        <footer class="footer container">

            <div class="footer__link">
                <a href="">agora na hbo max</a>
                <a href="">em breve</a>
                <a href="">filme em destaque</a>
                <a href="">séries</a>
                <a href="">ajuda</a>
            </div>
            <div class="footer__copyright">
                <p>© 2022 WarnerMedia Direct Latin America, LLC. Todos os direitos reservados. HBO Max é usado sob licença.</p>
            </div>
            <div class="footer__medias">
                <a href="https://www.facebook.com/HBOMaxBr/" class="footer__social-link">
                    <img src="assets/img/fb_0.png" alt="Facebook">
                </a>

                <a href="https://twitter.com/HBOMaxBR" class="footer__social-link">
                    <img src="assets/img/twitter_0.png" alt="Twitter">
                </a>
                <a href="https://www.instagram.com/hbomaxbr/" class="footer__social-link">
                    <img src="assets/img/instagram_0.png" alt="Instagram">
                </a>
                <a href="https://www.youtube.com/c/hbomaxbr" class="footer__social-link">
                    <img src="assets/img/youtube_0.png" alt="Youtube">
                </a>
            </div>

        </footer>
    </div>
</body>

</html>
